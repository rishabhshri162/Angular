<div align="center">
    <h1>Add Role</h1>
    <h3 style="color: green;">{{form.message}}</h3>
    <form (submit)="saveRole()">
        <table>
            <tr>
                <th>Role Name</th>
                <td><input type="text" name="name" [(ngModel)]="form.data.name"
                        placeholder="enter your firstName"></td>
                <td style="color: red;">{{form.inputerror.name}}</td>
            </tr>
            <tr>
                <th>Role Description</th>
                <td><input type="text" name="description" [(ngModel)]="form.data.description"
                        placeholder="enter your role description"></td>
                         <td style="color: red;">{{form.inputerror.description}}</td>
            </tr>
           
            <tr>
                <th></th>
                <td><input type="submit" value="save"></td>
            </tr>
        </table>
    </form>
</div>
