<div align="center">
    <h1>Login</h1>
    <h3 [style.color]="form.message? 'red' : 'green'">
        {{ form.message }}
    </h3>
    <form (submit)="signIn()">
        <table>
            <tr>
                <th>Login ID:</th>
                <td><input type="text" name="loginId" [(ngModel)]="form.data.loginId" placeholder="enter your loginId">
                </td>
                <td style="color: red;">{{form.inputerror.loginId}}</td>
            </tr>
            <tr>
                <th>Password</th>
                <td><input type="password" name="password" [(ngModel)]="form.data.password"
                        placeholder="enter your password"></td>
                <td style="color: red;">{{form.inputerror.password}}</td>
            </tr>

            <tr>
                <th></th>
                <td><input type="submit" value="signin"></td>
            </tr>
        </table>
    </form>
</div>
